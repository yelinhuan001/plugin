name: Build ClassDumpDylib
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .dylib
        run: |
          mkdir -p packages
          clang -shared \
            -fobjc-arc -I. \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -arch arm64 -arch arm64e \
            -miphoneos-version-min=14.0 \
            -lobjc -framework UIKit -framework Foundation \
            ClassDumpEntry.m ClassDumpSearcher.m SearchOverlayWindow.m \
            -o packages/ClassDumpDylib.dylib

      - name: Upload .dylib
        uses: actions/upload-artifact@v4
        with:
          name: ClassDumpDylib
          path: packages/ClassDumpDylib.dylib
