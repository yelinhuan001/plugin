name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖 (ldid)
        run: brew install ldid

      - name: 编译
        run: |
          # 直接调用你仓库里的 Makefile
          make

      - name: 上传产物
        # 这里的路径要对应 Makefile 里的 OUTDIR (packages)
        uses: actions/upload-artifact@v4
        with:
          name: ClassDumpDylib
          path: packages/ClassDumpDylib.dylib
