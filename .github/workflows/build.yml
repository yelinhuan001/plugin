name: Build Dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 优先尝试使用您的 Makefile 自动编译今天的所有新代码
      - name: Build with Makefile
        run: |
          if [ -f Makefile.standalone ]; then
            echo "发现 Makefile.standalone，开始编译..."
            make -f Makefile.standalone
          elif [ -f Makefile ]; then
            echo "发现 Makefile，开始编译..."
            make
          else
            echo "未发现 Makefile，执行备用编译命令..."
            clang -dynamiclib -framework Foundation -framework UIKit \
              CDSOverlay.m ClassDumpSearch.m TweakEntry.m \
              -o ClassDumpSearch_iOS.dylib
          fi

      # 2. 上传编译好的最新 dylib
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-dylibs
          path: |
            *.dylib
