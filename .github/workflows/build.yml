name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 诊断
        run: |
          echo "=== 系统 ==="
          uname -a
          echo "=== Xcode列表 ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "无"
          echo "=== 当前Xcode ==="
          xcode-select -p 2>&1
          echo "=== SDK查找 ==="
          xcrun --sdk iphoneos --show-sdk-path 2>&1 || echo "xcrun失败"
          find /Applications -name "iPhoneOS.sdk" -maxdepth 6 2>/dev/null | head -3
          find /Library/Developer -name "iPhoneOS.sdk" -maxdepth 6 2>/dev/null | head -3
          echo "=== clang版本 ==="
          clang --version 2>&1

      - name: 编译
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || find /Applications -name "iPhoneOS.sdk" -type d 2>/dev/null | head -1)
          echo "最终SDK: $SDK"
          mkdir -p packages
          clang -shared -fobjc-arc -I. \
            -isysroot "$SDK" \
            -arch arm64 \
            -miphoneos-version-min=14.0 \
            -lobjc -framework UIKit -framework Foundation \
            ClassDumpEntry.m ClassDumpSearcher.m SearchOverlayWindow.m \
            -o packages/ClassDumpDylib.dylib 2>&1
          echo "退出码: $?"

      - name: 上传
        if: hashFiles('packages/ClassDumpDylib.dylib') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ClassDumpDylib
          path: packages/ClassDumpDylib.dylib
