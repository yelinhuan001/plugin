name: Build ClassDumpDylib
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find SDK & Compile
        run: |
          set -e
          echo "=== Xcode ==="
          ls /Applications/ | grep -i xcode || echo "No Xcode in /Applications"
          xcodebuild -version 2>/dev/null || echo "xcodebuild not available"
          SDK=""
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null) && echo "方式1 OK" || echo "方式1 失败"
          if [ -z "$SDK" ]; then
            SDK=$(find /Applications -name "iPhoneOS.sdk" -type d 2>/dev/null | head -1) && echo "方式2 OK" || echo "方式2 失败"
          fi
          if [ -z "$SDK" ]; then
            SDK=$(find /Library/Developer -name "iPhoneOS.sdk" -type d 2>/dev/null | head -1) && echo "方式3 OK" || echo "方式3 失败"
          fi
          if [ -z "$SDK" ]; then
            echo "❌ 所有方式都无法找到 iOS SDK"
            exit 1
          fi
          echo "✅ 找到 SDK: $SDK"
          mkdir -p packages
          clang -shared \
            -fobjc-arc -I. \
            -isysroot "$SDK" \
            -arch arm64 \
            -miphoneos-version-min=14.0 \
            -lobjc -framework UIKit -framework Foundation \
            ClassDumpEntry.m ClassDumpSearcher.m SearchOverlayWindow.m \
            -o packages/ClassDumpDylib.dylib 2>&1
          echo "✅ 编译完成"
          ls -lh packages/

      - name: Upload .dylib
        uses: actions/upload-artifact@v4
        with:
          name: ClassDumpDylib
          path: packages/ClassDumpDylib.dylib
