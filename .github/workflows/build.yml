name: Build ClassDumpDylib
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 诊断环境
        run: |
          echo "=== 系统信息 ==="
          uname -a
          echo "=== Xcode ==="
          xcode-select -p 2>&1
          xcrun --show-sdk-path 2>&1 || true
          xcrun --sdk iphoneos --show-sdk-path 2>&1 || true
          echo "=== SDK 文件 ==="
          find /Applications -name "iPhoneOS.sdk" -maxdepth 6 2>/dev/null || true
          find /Library -name "iPhoneOS.sdk" -maxdepth 6 2>/dev/null || true
          echo "=== clang ==="
          clang --version 2>&1 || true

      - name: 编译
        run: |
          set -e
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>&1)
          echo "SDK路径: $SDK"
          mkdir -p packages
          clang -shared \
            -fobjc-arc -I. \
            -isysroot "$SDK" \
            -arch arm64 \
            -miphoneos-version-min=14.0 \
            -lobjc -framework UIKit -framework Foundation \
            ClassDumpEntry.m ClassDumpSearcher.m SearchOverlayWindow.m \
            -o packages/ClassDumpDylib.dylib
          echo "✅ 编译成功"
          ls -lh packages/

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: ClassDumpDylib
          path: packages/ClassDumpDylib.dylib
