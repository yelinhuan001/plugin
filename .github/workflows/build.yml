name: Build ClassDumpDylib
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          echo "=== Xcode路径 ==="
          ls /Applications/ | grep -i xcode || echo "未找到Xcode"
          echo "=== 选择Xcode ==="
          XCODE=""
          for p in /Applications/Xcode*.app; do [ -d "$p" ] && XCODE="$p" && break; done
          echo "使用: $XCODE"
          [ -n "$XCODE" ] && sudo xcode-select -s "$XCODE/Contents/Developer" 2>/dev/null
          echo "=== SDK ==="
          /usr/bin/xcrun --sdk iphoneos --show-sdk-path 2>&1 || echo "xcrun失败"
          echo "=== 编译 ==="
          mkdir -p packages
          clang -shared -fobjc-arc -I. \
            -isysroot "$(/usr/bin/xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)" \
            -arch arm64 -miphoneos-version-min=14.0 \
            -lobjc -framework UIKit -framework Foundation \
            ClassDumpEntry.m ClassDumpSearcher.m SearchOverlayWindow.m \
            -o packages/ClassDumpDylib.dylib 2>&1
          echo "=== 结果 ==="
          ls -lh packages/ 2>/dev/null || echo "编译失败"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ClassDumpDylib
          path: packages/ClassDumpDylib.dylib
