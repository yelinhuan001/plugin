# 无 Mac：用 GitHub 免费 macOS 云主机自动编译 dylib
# 编译完成后在 Actions → 对应运行记录 → Artifacts 下载
name: Build iOS dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 网页上可点 “Run workflow” 手动编译
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode / SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphoneos --show-sdk-version

      - name: Build dylib
        run: |
          chmod +x scripts/build_on_mac.sh || true
          make -f Makefile.standalone clean || true
          make -f Makefile.standalone
          file packages/TrollDylibPlugin.dylib
          ls -la packages/

      - name: Ad-hoc codesign
        run: |
          codesign -s - --force packages/TrollDylibPlugin.dylib || true
          codesign -dv packages/TrollDylibPlugin.dylib 2>&1 || true

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollDylibPlugin-dylib
          path: packages/TrollDylibPlugin.dylib
          if-no-files-found: error
          retention-days: 30
